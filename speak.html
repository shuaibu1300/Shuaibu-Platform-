<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuaibu Platform</title>
<style>
body { font-family: Arial,sans-serif; background-color:#f4f4f9; color:#333; padding:20px; }
h1{text-align:center;color:#00796b;}
#loginDiv,#adminDiv,#viewDiv{max-width:500px;margin:20px auto;padding:20px;background-color:#e0f7fa;border-radius:5px;}
input,button,textarea{width:100%;margin-top:10px;padding:10px;border-radius:4px;border:1px solid #ccc;box-sizing:border-box;font-size:16px;}
button{background-color:#00796b;color:white;border:none;cursor:pointer;transition:0.2s;}
button:hover{background-color:#004d40;}
.info-list{display:flex;flex-direction:column;gap:15px;margin-top:20px;}
.info-box{background-color:#e0f7fa;border-left:5px solid #00796b;padding:15px 20px;border-radius:5px;position:relative;}
.info-box h2{margin:0 0 5px 0;color:#00796b;font-size:18px;font-weight:bold;}
.info-box p{margin:0;font-size:16px;}
.delete-btn{position:absolute;top:5px;right:5px;background-color:#d32f2f;color:white;border:none;padding:3px 6px;font-size:12px;border-radius:3px;cursor:pointer;}
.delete-btn:hover{background-color:#9a0007;}
#clearAll{display:block;margin:20px auto;padding:10px 20px;background-color:#f57c00;color:white;border:none;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>

<h1>Speak Arabic & English</h1>

<!-- Login -->
<div id="loginDiv">
  <h2>Admin Login</h2>
  <input type="password" id="passwordInput" placeholder="Shigar da password">
  <button id="loginBtn">Login</button>
</div>

<!-- Admin Panel -->
<div id="adminDiv" style="display:none;">
  <form id="bayaniForm">
      <input type="text" id="suna" placeholder="Saka sunan mutum" required>
      <textarea id="details" placeholder="Saka cikakken bayani" rows="4" required></textarea>
      <button type="submit">Ƙara Bayani</button>
  </form>
  <div class="info-list" id="adminInfoList"></div>
  <button id="clearAll">Share Duk Bayanai</button>
</div>

<!-- View Panel -->
<div id="viewDiv">
  <h2>Arabic & English</h2>
  <div class="info-list" id="viewInfoList"></div>
</div>

<script>
const loginDiv = document.getElementById("loginDiv");
const adminDiv = document.getElementById("adminDiv");
const viewDiv = document.getElementById("viewDiv");
const loginBtn = document.getElementById("loginBtn");
const passwordInput = document.getElementById("passwordInput");
const correctPassword = "admin123";

const form = document.getElementById("bayaniForm");
const clearAllBtn = document.getElementById("clearAll");

const adminInfoList = document.getElementById("adminInfoList");
const viewInfoList = document.getElementById("viewInfoList");

// Load data from localStorage or start empty
let bayanai = JSON.parse(localStorage.getItem("bayanai")) || [];

// Functions to render boxes
function addAdminBox(bayani,index){
    const box = document.createElement("div");
    box.className="info-box";
    box.innerHTML=`<h2>${bayani.suna}</h2><p>${bayani.details}</p><button class="delete-btn">Delete</button>`;
    box.querySelector(".delete-btn").onclick=()=>{
        if(confirm("Tabbatar kana son share wannan bayani?")){
            bayanai.splice(index,1);
            saveAndRender();
        }
    };
    adminInfoList.appendChild(box);
}

function addViewBox(bayani){
    const box = document.createElement("div");
    box.className="info-box";
    box.innerHTML=`<h2>${bayani.suna}</h2><p>${bayani.details}</p>`;
    viewInfoList.appendChild(box);
}

// Render all
function renderLists(){
    adminInfoList.innerHTML="";
    viewInfoList.innerHTML="";
    bayanai.forEach((b,i)=>{
        addAdminBox(b,i);
        addViewBox(b);
    });
}

// Save to localStorage and render
function saveAndRender(){
    localStorage.setItem("bayanai",JSON.stringify(bayanai));
    renderLists();
}

// Login
loginBtn.addEventListener("click",()=>{
    if(passwordInput.value===correctPassword){
        loginDiv.style.display="none";
        adminDiv.style.display="block";
    }else{
        alert("Password ba daidai ba ne!");
        passwordInput.value="";
    }
});

// Form submit
form.addEventListener("submit",(e)=>{
    e.preventDefault();
    const suna=document.getElementById("suna").value.trim();
    const details=document.getElementById("details").value.trim();
    if(suna && details){
        bayanai.push({suna,details});
        saveAndRender();
        form.reset();
    }
});

// Clear all
clearAllBtn.addEventListener("click",()=>{
    if(confirm("Tabbatar kana son share dukkan bayanai?")){
        bayanai=[];
        saveAndRender();
    }
});

// Initial render
renderLists();
</script>

</body>
</html>
