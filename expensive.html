<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuaibu Platform|Expense</title>

<style>

body{
font-family:Arial;
margin:0;
background: #463333;
color: white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:340px;
background: #5a4040;
padding:20px;
border-radius:10px;
}

input{
width:95%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:none;
}

button{
width:101%;
padding:10px;
background: #ebd4d4;
border:none;
cursor:pointer;
font-weight:bold;
}

.list{
list-style:none;
padding:0;
}

.list li{
background:white;
color:black;
padding:10px;
margin:10px 0;
display:flex;
justify-content:space-betweengreen,red;
}

.plus{
border-right:5px solid green;
}

.minus{
border-right:5px solid red;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<!-- LOGIN / REGISTER -->

<div class="container" id="auth">

<h2>Create Account</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="createAccount()">Create Account</button>

<br><br>

<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- EXPENSE APP -->

<div class="container hidden" id="app">

<h2>Expense Tracker</h2>

<h4>Your Balance</h4>
<h1 id="balance">$0.00</h1>

<div style="display:flex;justify-content:space-between;background:#ebd4d4;color:black;padding:10px;margin:10px 0">

<div>
<h4>Income</h4>
<p id="money-plus">0</p>
</div>

<div>
<h4>Expense</h4>
<p id="money-minus">0</p>
</div>

</div>

<h3>History</h3>

<ul id="list" class="list"></ul>

<h3>Add Transaction</h3>

<form id="form">

<input type="text" id="text" placeholder="Enter text">

<input type="number" id="amount" placeholder="Enter amount">

<button>Add Transaction</button>

</form>
<br/>
<button onclick="logout()">Logout</button>

</div>

<script>

let currentUser=null

function createAccount(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

if(user===""||pass===""){
alert("Fill all fields")
return
}

localStorage.setItem("user_"+user,pass)

alert("Account created")

}

function login(){

const user=document.getElementById("loginUser").value
const pass=document.getElementById("loginPass").value

const savedPass=localStorage.getItem("user_"+user)

if(savedPass===pass){

currentUser=user

document.getElementById("auth").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

loadTransactions()

}else{

alert("Wrong login")

}

}

function logout(){

location.reload()

}

const balance=document.getElementById("balance")
const money_plus=document.getElementById("money-plus")
const money_minus=document.getElementById("money-minus")
const list=document.getElementById("list")
const form=document.getElementById("form")
const text=document.getElementById("text")
const amount=document.getElementById("amount")

let transactions=[]

function loadTransactions(){

const data=localStorage.getItem("transactions_"+currentUser)

transactions=data?JSON.parse(data):[]

init()

}

function saveTransactions(){

localStorage.setItem("transactions_"+currentUser,JSON.stringify(transactions))

}

function generateID(){

return Math.floor(Math.random()*100000000)

}

function addTransactionDOM(transaction){

const sign=transaction.amount<0?"-":"+"

const item=document.createElement("li")

item.classList.add(transaction.amount<0?"minus":"plus")

item.innerHTML=`
${transaction.text}
<span>${sign}$${Math.abs(transaction.amount)}</span>
<button onclick="removeTransaction(${transaction.id})">x</button>
`

list.appendChild(item)

}

function updateValues(){

const amounts=transactions.map(t=>t.amount)

const total=amounts.reduce((a,b)=>a+b,0).toFixed(2)

const income=amounts.filter(a=>a>0).reduce((a,b)=>a+b,0).toFixed(2)

const expense=(amounts.filter(a=>a<0).reduce((a,b)=>a+b,0)*-1).toFixed(2)

balance.innerText="$"+total
money_plus.innerText=income
money_minus.innerText=expense

}

function addTransaction(e){

e.preventDefault()

if(text.value===""||amount.value===""){
alert("Enter text and amount")
return
}

const transaction={
id:generateID(),
text:text.value,
amount:+amount.value
}

transactions.push(transaction)

saveTransactions()

init()

text.value=""
amount.value=""

}

function removeTransaction(id){

transactions=transactions.filter(t=>t.id!==id)

saveTransactions()

init()

}

function init(){

list.innerHTML=""

transactions.forEach(addTransactionDOM)

updateValues()

}

form.addEventListener("submit",addTransaction)

</script>

</body>
</html>
