<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuaibu Platform| Arabic</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
direction:rtl;
}

header{
background:#198754;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
}

input,button{
padding:8px;
margin:5px;
direction:ltr;
text-align:left;
}

button{
background:#198754;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.card{
background:white;
padding:10px;
margin:5px 0;
border-radius:6px;
}

.letters button{
background:#198754;
margin:2px;
}

.admin{
background:#fff3cd;
padding:10px;
border-radius:6px;
margin-top:10px;
}

</style>

</head>
<body>

<header>
<h2>Arabic Hausa Dictionary</h2>
</header>

<div class="container">

<input type="text" id="searchBox" placeholder="Bincika kalma...">
<button onclick="searchWord()">Search</button>

<div id="result"></div>

<div class="letters" id="lettersDiv"></div>

<div id="wordList"></div>

<div class="admin">

<h3>Admin Panel</h3>

<input type="password" id="adminPass" placeholder="Password"><br>

<input type="text" id="eng" placeholder="Arabic word">
<input type="text" id="hau" placeholder="Hausa meaning">

<button onclick="addWord()">Add Word</button>

</div>

</div>

<script>

const searchBox=document.getElementById("searchBox");
const result=document.getElementById("result");
const lettersDiv=document.getElementById("lettersDiv");
const wordList=document.getElementById("wordList");

if(!localStorage.getItem("dictPassword")){
localStorage.setItem("dictPassword","12345");
}

let dictionary=JSON.parse(localStorage.getItem("dictionary")) || {

كتاب:"littafi",
ولد:"yaro",
بنت:"yarinya",
ماء:"ruwa",
بيت:"gida",
مدرسة:"makaranta",
معلم:"malami",
طالب:"dalibi",
رجل:"namiji",
امرأة:"mace",
باب:"kofa",
سيارة:"mota",
سمك:"kifi",
كلب:"kare",
ملك:"sarki",
ماعز:"akuya"

};

let letters="ابتثجحخدذرزسشصضطظعغفقكلمنهوي";

letters.split("").forEach(l=>{
let btn=document.createElement("button");
btn.innerText=l;
btn.onclick=function(){showLetter(l)};
lettersDiv.appendChild(btn);
});

function searchWord(){

let w=searchBox.value;

if(dictionary[w]){

result.innerHTML=
`<div class="card"><b>${w}</b> = ${dictionary[w]}</div>`;

}else{

result.innerHTML=
`<div class="card">Ba a samu ba</div>`;

}

}

function showLetter(letter){

let html="";

for(let w in dictionary){

if(w.startsWith(letter)){

html+=`<div class="card">${w} = ${dictionary[w]}</div>`;

}

}

wordList.innerHTML=html;

}

function addWord(){

let pass=document.getElementById("adminPass").value;
let realPass=localStorage.getItem("dictPassword");

if(pass!==realPass){
alert("Wrong password");
return;
}

let e=document.getElementById("eng").value;
let h=document.getElementById("hau").value;

if(!e||!h)return;

dictionary[e]=h;

localStorage.setItem("dictionary",JSON.stringify(dictionary));

alert("Word added");

}

</script>

</body>
</html>
